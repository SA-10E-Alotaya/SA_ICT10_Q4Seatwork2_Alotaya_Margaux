<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Grade 10 Classmates System</title>
    <style>
        body {
            background: #eef3fb;
        }
        .card-rounded {
            border-radius: 1rem;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #7d89a3;
        }
    </style>
</head>
<body class="d-flex justify-content-center py-5">
    <div class="container" style="max-width: 760px;">
        <div class="text-center mb-4">
            <h1 class="fw-bold"> Grade 10 Classmates System</h1>
            <p class="text-secondary">Add and view your classmates easily</p>
        </div>

        <div class="card card-rounded mb-4 bg-white p-4">
            <div class="mb-3">
                <input id="name-input" type="text" class="form-control form-control-lg" placeholder="Enter classmate name">
            </div>
            <div class="row g-3 mb-3">
                <div class="col-12 col-md-6">
                    <input id="section-input" type="text" class="form-control form-control-lg" placeholder="Enter section">
                </div>
                <div class="col-12 col-md-6">
                    <input id="subject-input" type="text" class="form-control form-control-lg" placeholder="Enter favorite subject">
                </div>
            </div>
            <div class="d-flex gap-2">
                <button id="add-button" class="btn btn-lg flex-fill" style="background-color:#ffb6c1; border-color:#ffb6c1; color:#1d1d1d;" py-click="add_classmate">Add Classmate</button>
                <button id="show-button" class="btn btn-success btn-lg flex-fill" py-click="toggle_list">Show List</button>
            </div>
            <div id="message" class="mt-2 small"></div>
        </div>

        <div class="card card-rounded bg-white p-4">
            <h4 class="mb-3">📋 Classmate List</h4>
            <div id="classmate-list-wrapper" style="display:none;">
                <div id="classmate-list"></div>
            </div>
        </div>
    </div>

    <py-script src="main.py"></py-script>
</body>
</html>
